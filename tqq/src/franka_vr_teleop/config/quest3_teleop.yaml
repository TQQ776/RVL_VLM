/**:
  quest3_udp_bridge:
    ros__parameters:
      listen_host: 0.0.0.0
      listen_port: 5055
      frame_id: quest3_right_controller
      pose_topic: /quest3/right_controller/pose
      grip_topic: /quest3/right_controller/grip_pressed
      trigger_topic: /quest3/right_controller/trigger_pressed
      calibrate_topic: /quest3/right_controller/calibrate_pressed
      reset_calibration_topic: /quest3/right_controller/reset_calibration_pressed
      head_forward_topic: /quest3/head_forward
      max_packet_bytes: 65535

  quest3_pose_to_twist:
    ros__parameters:
      # Adapt these topics to your Quest 3 ROS bridge.
      controller_pose_topic: /quest3/right_controller/pose
      enable_topic: /quest3/right_controller/grip_pressed
      calibrate_topic: /quest3/right_controller/calibrate_pressed
      reset_calibration_topic: /quest3/right_controller/reset_calibration_pressed
      head_forward_topic: /quest3/head_forward
      twist_topic: /vr_cartesian_velocity_controller/twist_cmd

      publish_rate_hz: 60.0
      input_timeout_sec: 0.25

      # Controller displacement [m] -> robot TCP velocity [m/s].
      linear_gain: 2.4
      angular_gain: 0.5

      max_linear_velocity_mps: 0.12
      max_angular_velocity_radps: 0.25
      deadband_position_m: 0.02
      deadband_rotation_rad: 0.10
      deadband_linear_velocity_mps: 0.01
      deadband_angular_velocity_radps: 0.03
      motion_mode: hand_velocity
      input_smoothing_alpha: 0.15
      idle_decay_alpha: 0.08
      max_controller_linear_velocity_mps: 0.4
      max_controller_angular_velocity_radps: 1.2

      # Default mapping can be overridden by config/quest3_axis_mapping.yaml.
      # Output order is [base_x, base_y, base_z].
      linear_axis_map: ["x", "z", "y"]
      angular_axis_map: ["-x", "-z", "-y"]
      use_heading_calibration: false
      calibration_forward_axis: x
      calibration_min_forward_norm: 0.2

      # Flip axes here if your Quest bridge coordinate frame differs.
      invert_x: false
      invert_y: false
      invert_z: false
      send_zero_when_disabled: true
  quest3_gripper_bridge:
    ros__parameters:
      close_button_topic: /quest3/right_controller/trigger_pressed
      gripper_action: /franka_gripper/move
      open_position_m: 0.08
      closed_position_m: 0.0
      speed_mps: 0.05
