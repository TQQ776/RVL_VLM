/**:
  ros__parameters:
    service_name: /mcp_omni_client/record_and_run
    transcript_topic: /mcp_omni_client/transcript
    response_topic: /mcp_omni_client/response
    status_topic: /mcp_omni_client/status

    record_seconds: 5.0
    sample_rate: 16000
    channels: 1
    audio_device: default
    record_format: S16_LE
    output_dir: /tmp/audio_dialog

    no_speech_text: 没有听到清楚的语音，请再说一次。

    omni_api_key_env: DASHSCOPE_API_KEY
    omni_base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
    omni_model: qwen3.5-omni-plus-realtime
    omni_text_model: qwen3.5-omni-plus
    omni_realtime_url: wss://dashscope.aliyuncs.com/api-ws/v1/realtime
    omni_realtime_voice: Ethan
    omni_realtime_chunk_bytes: 3200
    omni_realtime_chunk_sleep_sec: 0.01
    omni_realtime_enable_search: false
    omni_realtime_connect_retries: 3
    omni_realtime_connect_retry_delay_sec: 1.0
    omni_realtime_smooth_output: true
    omni_native_audio_output_enabled: true
    omni_native_audio_fallback_to_local_tts: false
    omni_native_audio_sample_rate: 24000
    omni_native_audio_silence_bytes: 3200
    omni_native_audio_timeout: 90.0
    omni_speech_rate: normal
    omni_speech_volume: normal
    omni_speech_emotion: natural
    omni_speech_style: 清晰、自然、友好，适合机器人语音助手
    omni_timeout: 90.0
    omni_max_tokens: 1000
    conversation_memory_enabled: true
    conversation_memory_max_turns: 8
    conversation_memory_max_chars: 4000

    play_tts: true

    list_tools_service: /mcp_server/list_tools
    call_tool_service: /mcp_server/call_tool
    mcp_emergency_stop_service: /mcp_server/emergency_stop
    push_to_talk_enabled: false
    push_to_talk_key: r
    stop_record_key: q
    min_record_seconds: 0.3
    text_popup_enabled: true
    text_popup_key: t
    text_popup_title: fr3对话框
    text_popup_prompt: 输入文本后按 Enter 发送，Shift+Enter 换行；也可以点击录音按钮语音输入。
    text_popup_auto_open: true

    mcp_service_wait_timeout_sec: 10.0
    mcp_tool_timeout_sec: 220.0
    mcp_long_tool_timeout_sec: 900.0
    mcp_max_tool_rounds: 10

    auto_run: false
