/**:
  ros__parameters:
    service_name: /mcp_omni_client/record_and_run
    transcript_topic: /mcp_omni_client/transcript
    response_topic: /mcp_omni_client/response
    status_topic: /mcp_omni_client/status

    record_seconds: 5.0
    sample_rate: 16000
    channels: 1
    audio_device: default
    record_format: S16_LE
    output_dir: /tmp/speech

    no_speech_text: 没有听到清楚的语音，请再说一次。

    omni_api_key_env: DASHSCOPE_API_KEY
    omni_base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
    omni_model: qwen3.5-omni-plus-realtime
    omni_text_model: qwen3.5-omni-plus
    omni_realtime_url: wss://dashscope.aliyuncs.com/api-ws/v1/realtime
    omni_realtime_voice: Ethan
    omni_realtime_chunk_bytes: 3200
    omni_realtime_chunk_sleep_sec: 0.01
    omni_realtime_enable_search: false
    omni_realtime_connect_retries: 3
    omni_realtime_connect_retry_delay_sec: 1.0
    omni_realtime_smooth_output: true
    omni_native_audio_output_enabled: true
    omni_native_audio_fallback_to_local_tts: false
    omni_native_audio_sample_rate: 24000
    omni_native_audio_silence_bytes: 3200
    omni_native_audio_timeout: 90.0
    omni_speech_rate: normal
    omni_speech_volume: normal
    omni_speech_emotion: natural
    omni_speech_style: 清晰、自然、友好，适合机器人语音助手
    omni_timeout: 90.0
    omni_max_tokens: 1000

    vision_enabled: true
    vision_auto_attach_to_turns: false
    vision_image_topic: /camera/camera/color/image_raw
    vision_max_image_width: 0
    vision_jpeg_quality: 85
    vision_image_max_age_sec: 30.0
    vision_show_window: true
    vision_window_name: Qwen-Omni Vision Box
    vision_save_images: true
    vision_output_dir: /home/tqq/TQQ_ws/omni_vision_outputs
    vision_result_hold_sec: 60.0

    play_tts: true

    push_to_talk_enabled: true
    push_to_talk_key: r
    stop_record_key: q
    min_record_seconds: 0.3
    text_popup_enabled: true
    text_popup_key: t
    text_popup_title: MCP 文本输入
    text_popup_prompt: 输入文本后按 Ctrl+Enter 发送，或按 Esc 取消。

    go_home_service: /mcp_server/go_home
    move_x_service: /mcp_server/move_x_cm
    move_y_service: /mcp_server/move_y_cm
    move_z_service: /mcp_server/move_z_cm
    list_yolo_objects_service: /mcp_server/list_yolo_objects
    grab_object_service: /mcp_server/grab_object
    open_gripper_service: /mcp_server/open_gripper
    close_gripper_service: /mcp_server/close_gripper
    mcp_service_wait_timeout_sec: 10.0
    mcp_tool_timeout_sec: 80.0
    detected_objects_topic: /object_target_controller/detected_objects
    yolo_objects_max_age_sec: 5.0
    llm_resolve_grasp_target: true
    api_detections_topic: /mcp_omni_client/api_detections_json
    target_command_topic: /economic_grasp_roi/target_class_name
    api_detection_default_confidence: 0.90
    api_detection_publish_settle_sec: 0.25
    api_detection_republish_count: 3
    api_detection_republish_interval_sec: 0.15
    # Qwen-Omni/VLM boxes are commonly returned in a 0-1000 visual coordinate space.
    # The client normalizes them first, then maps to the real camera image size.
    api_detection_box_coordinate_space: qwen_1000
    api_detection_box_reference_size: 1000.0
    grab_api_default_motion_speed: 0.05

    auto_run: false
