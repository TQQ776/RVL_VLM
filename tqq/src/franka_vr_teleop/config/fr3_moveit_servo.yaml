servo_node:
  ros__parameters:
    moveit_servo:
      use_gazebo: false

      # The Quest bridge publishes TwistStamped in real speed units.
      command_in_type: "speed_units"
      scale:
        linear: 0.12
        rotational: 0.25
        joint: 0.5

      # Servo output. Keep this conservative for the real FR3.
      publish_period: 0.02
      low_latency_mode: false
      command_out_type: trajectory_msgs/JointTrajectory
      publish_joint_positions: true
      publish_joint_velocities: true
      publish_joint_accelerations: false
      smoothing_filter_plugin_name: "online_signal_smoothing::ButterworthFilterPlugin"

      # FR3 MoveIt model.
      move_group_name: fr3_arm
      planning_frame: fr3_link0
      ee_frame_name: fr3_hand_tcp
      robot_link_command_frame: fr3_link0
      is_primary_planning_scene_monitor: true

      incoming_command_timeout: 0.12
      num_outgoing_halt_msgs_to_publish: 6

      lower_singularity_threshold: 17.0
      hard_stop_singularity_threshold: 30.0
      leaving_singularity_threshold_multiplier: 2.0
      joint_limit_margin: 0.12

      cartesian_command_in_topic: ~/delta_twist_cmds
      joint_command_in_topic: ~/delta_joint_cmds
      joint_topic: /joint_states
      status_topic: ~/status
      command_out_topic: /fr3_arm_controller/joint_trajectory

      check_collisions: true
      collision_check_rate: 10.0
      self_collision_proximity_threshold: 0.01
      scene_collision_proximity_threshold: 0.02
