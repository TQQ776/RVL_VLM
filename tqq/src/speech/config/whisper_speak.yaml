/**:
  ros__parameters:
    service_name: /speech/record_and_speak
    transcript_topic: /speech/transcript
    response_topic: /speech/response
    status_topic: /speech/status

    record_seconds: 5.0
    sample_rate: 16000
    channels: 1
    audio_device: default
    record_format: S16_LE
    output_dir: /tmp/speech

    asr_engine: whisper
    whisper_model: small
    whisper_model_dir: /home/tqq/TQQ_ws/tqq/src/speech/model
    whisper_language: zh
    whisper_task: transcribe
    whisper_device: ''
    funasr_model: /home/tqq/TQQ_ws/tqq/src/speech/model/funasr/paraformer-zh
    funasr_vad_model: ''
    funasr_punc_model: ''
    funasr_device: ''
    funasr_hub: ms
    funasr_batch_size_s: 300.0
    funasr_vad_max_single_segment_time: 60000
    funasr_hotword: ''

    tts_engine: auto
    tts_language: zh-cn
    tts_voice: kal
    tts_edge_voice: zh-CN-XiaoxiaoNeural
    tts_edge_rate: '+0%'
    tts_edge_pitch: '+8Hz'
    tts_edge_volume: '+0%'
    tts_speed: false
    play_tts: true

    no_speech_text: 没有听到清楚的语音，请再说一次。

    push_to_talk_enabled: true
    push_to_talk_key: r
    stop_record_key: q
    min_record_seconds: 0.3

    auto_run: false
