/**:
  quest3_pose_to_twist:
    ros__parameters:
      # In the Servo launch, Quest Twist goes into MoveIt Servo instead of the
      # custom Franka Cartesian velocity controller.
      twist_topic: /servo_node/delta_twist_cmds

      # Balanced profile: still filters Quest noise, but keeps teleop responsive.
      linear_gain: 2.0
      angular_gain: 0.55
      max_linear_velocity_mps: 0.10
      max_angular_velocity_radps: 0.20

      deadband_linear_velocity_mps: 0.015
      deadband_angular_velocity_radps: 0.04

      input_smoothing_alpha: 0.08
      idle_decay_alpha: 0.12
      max_controller_linear_velocity_mps: 0.35
      max_controller_angular_velocity_radps: 1.0
