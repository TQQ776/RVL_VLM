/**:
  ros__parameters:
    joint_states_topic: /joint_states
    trajectory_action: /fr3_arm_controller/follow_joint_trajectory
    joint_names:
      - fr3_joint1
      - fr3_joint2
      - fr3_joint3
      - fr3_joint4
      - fr3_joint5
      - fr3_joint6
      - fr3_joint7
    home_joint_positions_deg: [74.0, -3.0, -7.0, -115.0, -1.0, 110.0, 22.0]
    home_move_duration_sec: 4.0
    home_trajectory_dt_sec: 0.05
    home_trajectory_start_delay_sec: 0.1
    home_wait_for_joint_state_sec: 3.0

    base_frame: fr3_link0
    end_effector_frame: fr3_hand_tcp
    move_group_name: fr3_arm
    ik_service: /compute_ik
    cartesian_path_service: /compute_cartesian_path
    move_group_action: /move_action
    execution_mode: move_group
    axis_move_execution_mode: cartesian
    plan_only: false
    avoid_collisions: true

    ik_timeout_sec: 0.5
    service_wait_timeout_sec: 5.0
    action_wait_timeout_sec: 10.0
    motion_duration_sec: 4.0
    max_single_axis_move_cm: 10.0
    goal_joint_tolerance: 0.01
    max_velocity_scaling: 0.05
    max_acceleration_scaling: 0.05
    num_planning_attempts: 5
    allowed_planning_time: 5.0
    axis_cartesian_max_step_m: 0.002
    axis_cartesian_jump_threshold: 0.0
    axis_cartesian_min_fraction: 0.99
    axis_cartesian_duration_per_cm_sec: 0.6
    axis_cartesian_min_duration_sec: 2.0

    gripper_move_actions:
      - /franka_gripper/move
      - /fr3_gripper/move
      - /left_fr3_gripper/move
    gripper_grasp_actions:
      - /franka_gripper/grasp
      - /fr3_gripper/grasp
      - /left_fr3_gripper/grasp
    gripper_server_wait_timeout_sec: 1.0
    gripper_action_timeout_sec: 10.0
    gripper_open_width_m: 0.08
    gripper_open_speed_mps: 0.05
    gripper_close_width_m: 0.0
    gripper_close_speed_mps: 0.03
    gripper_close_force_n: 50.0
    gripper_grasp_epsilon_inner_m: 0.01
    # Keep this large enough for object thickness, otherwise Franka reports
    # grasp failure after contact and the fingers may stop holding force.
    gripper_grasp_epsilon_outer_m: 0.08

    # YOLO/object-target bridge. The actual pixel/depth/TF/MoveIt target
    # pipeline is handled by control/object_target_controller.
    detected_objects_topic: /object_target_controller/detected_objects
    target_command_topic: /object_target_controller/target_class_name
    yolo_detect_once_service: /yolo/detect_once
    yolo_detection_wait_timeout_sec: 5.0
    target_command_settle_sec: 0.3
    detected_objects_max_age_sec: 2.0
    require_detected_before_grab: true
    require_target_command_subscriber: true
